name: Soroban CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Build and Test Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check Formatting
        run: cargo fmt --check
      - name: Run Cargo Clippy (Linting)
        run: cargo clippy
      - name: Run Unit Tests
        run: cargo test

  frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v3
        with:
          path: frontend/afristore-app/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('frontend/afristore-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: frontend/afristore-app
      - name: Run Lint
        run: npm run lint
        working-directory: frontend/afristore-app
      - name: Run Build
        run: npm run build
        working-directory: frontend/afristore-app
      - name: Run Tests
        run: npm run test
        working-directory: frontend/afristore-app

  indexer:
    name: Build and Test Indexer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v3
        with:
          path: indexer/node_modules
          key: ${{ runner.os }}-indexer-${{ matrix.node-version }}-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-indexer-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: indexer
      - name: Run Lint
        run: npm run lint
        working-directory: indexer
      - name: Run Build
        run: npm run build
        working-directory: indexer
      - name: Run Tests
        run: npm run test
        working-directory: indexer